<section class="py-24 bg-white">
  <div class="max-w-6xl mx-auto px-6">

    <!-- Section Header -->
    <div class="flex flex-col items-center text-center mb-16">
      <h2 class="text-3xl font-semibold text-gray-800 tracking-tight">About Me</h2>
      <div class="w-12 h-1 bg-blue-600 rounded-full mt-4"></div>
    </div>

    <!-- Content Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">

      <!-- Left — Avatar and details -->
      <div class="flex flex-col items-center gap-8">

        <!-- Avatar -->
        <div class="w-40 h-40 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-6xl font-semibold">
          {{ name.charAt(0) }}
        </div>

        <!-- Details -->
        <div class="w-full flex flex-col gap-3">
          @for (detail of details; track detail.label) {
            <div class="flex items-center justify-between py-3 border-b border-gray-100">
              <span class="text-sm text-gray-400 font-medium">{{ detail.label }}</span>
              <span class="text-sm text-gray-700">{{ detail.value }}</span>
            </div>
          }
        </div>

      </div>

      <!-- Right — Bio -->
      <div class="flex flex-col gap-6">
        @for (paragraph of bio; track paragraph) {
          <p class="text-gray-500 leading-relaxed">
            {{ paragraph }}
          </p>
        }

        <!-- Download CV Button -->
        
          <a href="/assets/cv.pdf"
          target="_blank"
          class="mt-4 self-start px-8 py-3 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors duration-200">
          Download CV
        </a>
      </div>

    </div>
  </div>
</section>
