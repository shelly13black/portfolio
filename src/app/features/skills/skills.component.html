<section class="py-24 bg-gray-50">
  <div class="max-w-6xl mx-auto px-6">

    <!-- Section Header -->
    <div class="flex flex-col items-center text-center mb-16">
      <h2 class="text-3xl font-semibold text-gray-800 tracking-tight">Skills</h2>
      <div class="w-12 h-1 bg-blue-600 rounded-full mt-4"></div>
      <p class="text-gray-500 mt-4 max-w-xl">
        Technologies and tools I work with on a daily basis in enterprise environments.
      </p>
    </div>

    <!-- Skills Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (category of skillCategories; track category.category) {
        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex flex-col gap-4">

          <!-- Category Header -->
          <div class="flex items-center gap-3">
            <span class="text-blue-600 font-mono text-lg">{{ category.icon }}</span>
            <h3 class="text-gray-800 font-medium text-sm">{{ category.category }}</h3>
          </div>

          <!-- Divider -->
          <div class="w-full h-px bg-gray-100"></div>

          <!-- Skill Chips -->
          <div class="flex flex-wrap gap-2">
            @for (skill of category.skills; track skill) {
              <span class="px-3 py-1 bg-blue-50 text-blue-700 text-xs font-medium rounded-full">
                {{ skill }}
              </span>
            }
          </div>

        </div>
      }
    </div>

  </div>
</section>
