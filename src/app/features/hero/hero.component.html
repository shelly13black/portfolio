<section class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="max-w-6xl mx-auto px-6 flex flex-col items-center text-center gap-6">

    <!-- Avatar Placeholder -->
    <div class="w-28 h-28 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-4xl font-semibold">
      {{ name.charAt(0) }}
    </div>

    <!-- Name -->
    <h1 class="text-4xl md:text-5xl font-semibold text-gray-800 tracking-tight">
      {{ name }}
    </h1>

    <!-- Title -->
    <h2 class="text-xl md:text-2xl text-blue-600 font-medium">
      {{ title }}
    </h2>

    <!-- Subtitle -->
    <p class="text-gray-500 text-lg max-w-xl">
      {{ subtitle }}
    </p>

    <!-- Divider -->
    <div class="w-16 h-1 bg-blue-600 rounded-full"></div>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 mt-2">
      
        <a routerLink="/projects"
        class="px-8 py-3 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors duration-200">
        View Projects
      </a>
      
        <a [href]="cvLink"
        target="_blank"
        class="px-8 py-3 border border-blue-600 text-blue-600 text-sm font-medium rounded-lg hover:bg-blue-50 transition-colors duration-200">
        Download CV
      </a>
    </div>

    <!-- Social Links -->
    <div class="flex items-center gap-6 mt-4">
      
        <a href="https://github.com/shelly13black"
        target="_blank"
        class="text-gray-400 hover:text-gray-700 transition-colors duration-200 text-sm">
        GitHub
      </a>
      <span class="text-gray-300">|</span>
      
        <a href="https://linkedin.com/in/shelly-mashilo-30aa0b74"
        target="_blank"
        class="text-gray-400 hover:text-gray-700 transition-colors duration-200 text-sm">
        LinkedIn
      </a>
    </div>

  </div>
</section>
