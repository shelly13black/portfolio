<nav class="fixed top-0 left-0 w-full z-50 bg-white shadow-sm border-b border-gray-100">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- Logo / Name -->
    <a href="#hero" class="text-xl font-semibold text-gray-800 tracking-tight">
      Shelly Mashilo
    </a>

    <!-- Desktop Links -->
    <ul class="hidden md:flex items-center gap-8">
      @for (link of navLinks; track link.anchor) {
        <li>
          <button
            (click)="scrollTo(link.anchor)"
            class="text-sm text-gray-500 hover:text-gray-800 transition-colors duration-200">
            {{ link.label }}
          </button>
        </li>
      }
    </ul>

    <!-- Mobile Hamburger -->
    <button
      class="md:hidden flex flex-col gap-1.5 p-2"
      (click)="toggleMenu()"
      aria-label="Toggle menu">
      <span class="block w-6 h-0.5 bg-gray-600"></span>
      <span class="block w-6 h-0.5 bg-gray-600"></span>
      <span class="block w-6 h-0.5 bg-gray-600"></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen) {
    <ul class="md:hidden flex flex-col px-6 pb-4 gap-4 bg-white border-t border-gray-100">
      @for (link of navLinks; track link.anchor) {
        <li>
          <button
            (click)="scrollTo(link.anchor)"
            class="text-sm text-gray-500 hover:text-gray-800 transition-colors duration-200">
            {{ link.label }}
          </button>
        </li>
      }
    </ul>
  }
</nav>

<!-- Spacer -->
<div class="h-16"></div>
